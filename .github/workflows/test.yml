name: run pytest
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api_test/requirement.txt')}}
          restore-keys: |
            ${{runner.os}}-pip

      - name: install dependencies
        run: | 
          pip install -r requirements.txt

      - name: init sqlite database
        run: |
          python testcases/_init_.py
          
      - name: run pytest
        run: |
          pytest

      - name: install java
        run: |
          sudo apt-get update && sudo apt-get install -y openjdk-11-jre
      - name: install allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxvf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: generate allure report
        run: allure generate allure-result --output allure-report --clean

