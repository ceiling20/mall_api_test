name: run pytest
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api_test/requirement.txt')}}
          restore-keys: |
            ${{runner.os}}-pip
      - name: install dependencies
        run: | 
          pip install -r requirements.txt
      - name: run pytest
        run: |
          pytest
