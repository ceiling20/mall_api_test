name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: mall
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7
        ports:
          - 6379:6379

      mongo:
        image: mongo:4
        ports:
          - 27017:27017

      rabbitmq:
        image: rabbitmq:3.9.11-management
        env:
          RABBITMQ_DEFAULT_USER: mall
          RABBITMQ_DEFAULT_PASS: mall
          RABBITMQ_DEFAULT_VHOST: /mall
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          while ! mysqladmin ping -h 127.0.0.1 -uroot -p123456 --silent; do
            sleep 1
          done

      - name: Initialize database schema
        run: mysql -h 127.0.0.1 -uroot -p123456 mall < sql/mall.sql

      - name: Start mall-admin
        run: |
          docker run -d --name mall-admin --network host \
            -e spring.datasource.url=jdbc:mysql://localhost:3306/mall?useSSL=false \
            -e spring.datasource.username=root \
            -e spring.datasource.password=123456 \
            -e JAVA_TOOL_OPTIONS="-XX:-UseContainerSupport -Duser.language=zh -Duser.region=CN" \
            ghcr.io/ceiling20/mall-admin:1.0-SNAPSHOT
          sleep 30

      - name: Check mall-admin logs
        run: docker logs mall-admin

      - name: Wait for mall-admin
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/actuator/health > /dev/null; then
              echo "mall-admin is ready"
              exit 0
            fi
            echo "[$i/30] Waiting... $(docker inspect mall-admin --format='{{.State.Health.Status}}' 2>/dev/null)"
            sleep 10
          done
          echo "FAILED. Full logs:"
          docker logs mall-admin
          exit 1

      - name: Start mall-portal
        run: |
          docker run -d --name mall-portal --network host \
            -e spring.datasource.url=jdbc:mysql://localhost:3306/mall?useSSL=false \
            -e spring.datasource.username=root \
            -e spring.datasource.password=123456 \
            -e JAVA_TOOL_OPTIONS="-XX:-UseContainerSupport -Duser.language=zh -Duser.region=CN" \
            ghcr.io/ceiling20/mall-portal:1.0-SNAPSHOT
          sleep 30

      - name: Check mall-portal logs
        run: docker logs mall-portal

      - name: Wait for mall-portal
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8085/actuator/health > /dev/null; then
              echo "mall-portal is ready"
              exit 0
            fi
            echo "[$i/30] Waiting portal... $(docker inspect mall-portal --format='{{.State.Health.Status}}' 2>/dev/null)"
            sleep 10
          done
          echo "FAILED. Full logs:"
          docker logs mall-portal
          exit 1

      - name: Run tests
        run: pytest testcases/ -v

      - name: Install Java
        run: sudo apt-get install -y openjdk-11-jre

      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxvf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        run: allure generate allure-results --output allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: .
