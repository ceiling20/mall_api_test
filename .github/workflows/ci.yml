name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: mall
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      mall-admin:
        image: ghcr.io/ceiling20/mall-admin:1.0-SNAPSHOT
        ports:
          - 8080:8080
        env:
          spring.datasource.url: jdbc:mysql://mysql:3306/mall?useSSL=false
          spring.datasource.username: root
          spring.datasource.password: 123456
        options: >-
          --health-interval=30s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          while ! mysqladmin ping -h 127.0.0.1 -uroot -p123456 --silent; do
            sleep 1
          done

      - name: Initialize database schema
        run: mysql -h 127.0.0.1 -uroot -p123456 mall < sql/mall.sql

      - name: Run tests
        run: pytest testcases/ -v

      - name: Install Java
        run: sudo apt-get install -y openjdk-11-jre

      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxvf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        run: allure generate allure-results --output allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: .
